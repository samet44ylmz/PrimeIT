name: Deploy PrimeIT

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy to Ubuntu Server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        envs: MONGO_CONNECTION_STRING,POSTGRES_PASSWORD,JWT_SECRET_KEY,ELASTICSEARCH_URL,MONGO_DATABASE_NAME,POSTGRES_USER,POSTGRES_DB,JWT_ISSUER,JWT_AUDIENCE,REDIS_URL,SEQ_URL,GROQ_API_KEY
        script: |
          cd ~/PrimeIT || exit 1
          git pull origin main
          
          # Create/Update .env file with all production variables
          echo "POSTGRES_USER=${POSTGRES_USER:-postgres}" > .env
          echo "POSTGRES_DB=${POSTGRES_DB:-PrimeITServerDb}" >> .env
          echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
          echo "MONGO_CONNECTION_STRING=$MONGO_CONNECTION_STRING" >> .env
          echo "MONGO_DATABASE_NAME=${MONGO_DATABASE_NAME:-PrimeITResumesDb}" >> .env
          echo "JWT_SECRET_KEY=$JWT_SECRET_KEY" >> .env
          echo "JWT_ISSUER=${JWT_ISSUER:-Me}" >> .env
          echo "JWT_AUDIENCE=${JWT_AUDIENCE:-My Projects}" >> .env
          echo "ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}" >> .env
          echo "REDIS_URL=${REDIS_URL:-redis:6379}" >> .env
          echo "SEQ_URL=${SEQ_URL:-http://seq:5341}" >> .env
          echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env

          # Refresh the environment
          echo "Eski konteynerlar durduruluyor..."
          docker compose -f docker-compose.yml down --remove-orphans || true
          
          echo "Build ve deploy ediliyor..."
          docker compose -f docker-compose.yml up -d --build --remove-orphans
      env:
        MONGO_CONNECTION_STRING: ${{ secrets.MONGO_CONNECTION_STRING }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        ELASTICSEARCH_URL: ${{ secrets.ELASTICSEARCH_URL }}
        MONGO_DATABASE_NAME: ${{ secrets.MONGO_DATABASE_NAME }}
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
        JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
        REDIS_URL: ${{ secrets.REDIS_URL }}
        SEQ_URL: ${{ secrets.SEQ_URL }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
