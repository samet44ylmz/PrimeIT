events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        server backend:8080;
    }

    # HTTP -> HTTPS yönlendirme
    server {
        listen 80;
        server_name primeit.gulsoft.com.tr;

        # Let's Encrypt doğrulama için
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS sunucusu
    server {
        listen 443 ssl;
        server_name primeit.gulsoft.com.tr;

        ssl_certificate /etc/letsencrypt/live/primeit.gulsoft.com.tr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/primeit.gulsoft.com.tr/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        location /api/ {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /health {
            access_log off;
            return 200 'healthy\n';
        }
    }
}
