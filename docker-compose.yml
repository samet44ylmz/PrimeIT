services:
  # --- Database & Cache ---
  postgres:
    image: postgres:15-alpine
    container_name: primeit_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-PrimeITServerDb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: primeit_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # --- Search & Logs ---
  elasticsearch:
    image: elasticsearch:7.17.5
    container_name: primeit_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  seq:
    image: datalust/seq:latest
    container_name: primeit_seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    restart: unless-stopped

  # --- Application ---
  backend:
    build: 
      context: ./PrimeITServer
      dockerfile: PrimeITServer.WebAPI/Dockerfile
    container_name: primeit_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - elasticsearch
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres;Database=${POSTGRES_DB:-PrimeITServerDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-password123}
      - ConnectionStrings__Redis=${REDIS_URL:-redis:6379}
      - MongoDbOptions__ConnectionString=${MONGO_CONNECTION_STRING}
      - MongoDbOptions__DatabaseName=${MONGO_DATABASE_NAME:-PrimeITResumesDb}
      - Elasticsearch__Url=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Serilog__SeqServerUrl=http://seq:80
    restart: unless-stopped

  frontend:
    build:
      context: ./PrimeITFrontend
      dockerfile: Dockerfile
    container_name: primeit_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  elastic_data:
  seq_data:
