services:
  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: primeit_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - primeit_network

  # --- Database & Cache ---
  postgres:
    image: postgres:15-alpine
    container_name: primeit_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-PrimeITServerDb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-PrimeITServerDb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - primeit_network

  redis:
    image: redis:7-alpine
    container_name: primeit_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - primeit_network

  # --- Search & Logs ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.21
    container_name: primeit_elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - primeit_network

  seq:
    image: datalust/seq:latest
    container_name: primeit_seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=Y
    ports:
      - "5341:80"
      - "5342:5341"
    volumes:
      - seq_data:/data
    restart: unless-stopped
    networks:
      - primeit_network

  # --- Application ---
  backend:
    build: 
      context: ./PrimeITServer
      dockerfile: PrimeITServer.WebAPI/Dockerfile
    container_name: primeit_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - ConnectionStrings__PostgreSQL=Host=postgres;Database=${POSTGRES_DB:-PrimeITServerDb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-password123}
      - ConnectionStrings__Redis=primeit_redis:6379
      - MongoDbOptions__ConnectionString=${MONGO_CONNECTION_STRING:-}
      - MongoDbOptions__DatabaseName=${MONGO_DATABASE_NAME:-PrimeITResumesDb}
      - Elasticsearch__Url=http://elasticsearch:9200
      - Jwt__SecretKey=${JWT_SECRET_KEY:-}
      - Serilog__SeqServerUrl=http://seq:80
    restart: unless-stopped
    networks:
      - primeit_network

  frontend:
    build:
      context: ./PrimeITFrontend
      dockerfile: Dockerfile
    container_name: primeit_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - primeit_network

networks:
  primeit_network:
    driver: bridge

volumes:
  postgres_data:
  elastic_data:
  seq_data:
